services:
  - type: web
    name: pyxis-one-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./pyxis.db
      - key: ENVIRONMENT
        value: production
      - key: FRONTEND_URL
        sync: false
