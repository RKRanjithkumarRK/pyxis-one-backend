name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  # ─── Backend ──────────────────────────────────────────────
  backend-lint:
    name: Backend — lint & type-check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nexusai/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install ruff mypy
      - run: ruff check app/
      - run: mypy app/ --ignore-missing-imports --no-error-summary || true

  backend-test:
    name: Backend — pytest ≥ 80% coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nexusai/backend
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: nexusai
          POSTGRES_PASSWORD: nexusai_dev
          POSTGRES_DB: nexusai_test
        ports: ["5432:5432"]
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5
    env:
      ENVIRONMENT: development
      DATABASE_URL: postgresql+asyncpg://nexusai:nexusai_dev@localhost:5432/nexusai_test
      REDIS_URL: redis://localhost:6379/1
      SECRET_KEY: ci_secret_key_minimum_32_characters_long
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install -r requirements.txt
      - run: pytest --cov-report=xml
      - uses: codecov/codecov-action@v4
        with:
          files: nexusai/backend/coverage.xml
          flags: backend

  # ─── Frontend ─────────────────────────────────────────────
  frontend-typecheck:
    name: Frontend — TypeScript
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nexusai/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: nexusai/frontend/package-lock.json
      - run: npm ci
      - run: npm run type-check

  frontend-test:
    name: Frontend — Vitest unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nexusai/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: nexusai/frontend/package-lock.json
      - run: npm ci
      - run: npm test

  e2e:
    name: E2E — Playwright
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: nexusai/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: nexusai/frontend/package-lock.json
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
      - run: npm run test:e2e -- --project=chromium
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000
          E2E_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
          E2E_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: nexusai/frontend/playwright-report/

  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    defaults:
      run:
        working-directory: nexusai
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm install -g @lhci/cli
      - run: cd frontend && npm ci && npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
      - run: lhci autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

  # ─── Security ─────────────────────────────────────────────
  zap-scan:
    name: OWASP ZAP — baseline scan
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: ${{ vars.STAGING_URL || 'http://localhost:3000' }}
          rules_file_name: nexusai/.zap/rules.tsv
          fail_action: false
          artifact_name: zap-report

  # ─── Docker build ─────────────────────────────────────────
  docker-build:
    name: Docker — build images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build backend
        uses: docker/build-push-action@v6
        with:
          context: nexusai/backend
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build frontend
        uses: docker/build-push-action@v6
        with:
          context: nexusai/frontend
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
